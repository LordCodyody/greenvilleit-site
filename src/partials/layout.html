<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  <link rel="canonical" href="{{canonical}}" />
  {{robots}}
  <meta name="theme-color" content="#0a1218" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{title}}" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:image" content="{{og_image}}" />
  <meta property="og:image:alt" content="Greenville IT Consulting — CISSP-led IT and security for Southeast SMBs" />
  <meta property="og:url" content="{{canonical}}" />
  <meta property="og:site_name" content="Greenville IT Consulting" />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{title}}" />
  <meta name="twitter:description" content="{{description}}" />
  <meta name="twitter:image" content="{{og_image}}" />
  <meta name="twitter:image:alt" content="Greenville IT Consulting — CISSP-led IT and security for Southeast SMBs" />

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/style.css" />

  {{schema}}

  {{extra_head}}

  <!-- Cloudflare Web Analytics placeholder — replace token before publishing
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "REPLACE_ME"}'></script>
  -->
</head>
<body class="{{page_class}}">
  <a class="skip-link" href="#main">Skip to content</a>
  {{header}}
  <main id="main">
    {{content}}
  </main>
  {{footer}}
  <script src="/assets/main.js" defer></script>
</body>
</html>
